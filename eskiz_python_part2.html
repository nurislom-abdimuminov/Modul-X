detail:'FUNKSIYA — BATAFSIL\n\nFunksiya — bir blok kodni nom bilan saqlash.\nDRY: Don\'t Repeat Yourself!\n\n━━━ ASOSIY SHAKL ━━━\n\ndef salomlash(ism):\n    print(f"Salom, {ism}!")\n\nsalomlash("Ali")   → Salom, Ali!\nsalomlash("Vali")  → Salom, Vali!\n\n━━━ PARAMETRLAR ━━━\n\ndef to\'rtburchak_maydoni(a, b):\n    return a * b\n\nnatija = to\'rtburchak_maydoni(4, 5)\nprint(natija)  → 20\n\n━━━ STANDART QIYMAT ━━━\n\ndef salomlash(ism, til="uz"):\n    if til == "uz":\n        return f"Salom, {ism}!"\n    return f"Hello, {ism}!"\n\nsalomlash("Ali")         → Salom, Ali!\nsalomlash("John","en")   → Hello, John!\n\n━━━ DOCSTRING ━━━\n\ndef funksiya(x):\n    """Bu funksiya x ni 2 ga ko\'paytiradi.\"\"\"\n    return x * 2\n\nprint(funksiya.__doc__)  → hujjatni chiqaradi\n\n━━━ NIMA UCHUN FUNKSIYA? ━━━\n\n1. DRY — takrorlanmas\n2. Kodni o\'qish oson\n3. Xatolarni topish oson\n4. Qayta ishlatish mumkin\n5. Test qilish oson',

info:'3.19 — FUNKSIYADAN QIYMAT QAYTARISH\nreturn — natija qaytarish va chiqish.\n\nNatija saqlanmasa yo\'qoladi:\nn = funksiya()  # saqla!\n\nBir necha qiymat:\nreturn a, b  → (a, b) tuple\na, b = funksiya()',
detail:'RETURN — BATAFSIL\n\n━━━ ASOSIY QOIDALAR ━━━\n\n1. return — funksiyani DARHOL to\'xtatadi\n2. return keyingi kod BAJARILMAYDI\n3. return yo\'q → None qaytadi\n4. Natijani saqlamasak yo\'qoladi\n\n━━━ TO\'G\'RI VA XATO ━━━\n\ndef yig\'ish(a, b):\n    return a + b\n    print("Bu bajarilmaydi!")  ← return dan keyin!\n\n# Natijani saqlash:\nx = yig\'ish(3, 7)   ← to\'g\'ri\nprint(x)  → 10\n\n# Saqlamasdan:\nyig\'ish(3, 7)       ← natija yo\'qoladi!\n\n━━━ BIR NECHA QIYMAT ━━━\n\ndef min_max(lst):\n    return min(lst), max(lst)\n\nkichik, katta = min_max([3, 1, 9, 2, 7])\nprint(kichik)  → 1\nprint(katta)   → 9\n\n━━━ EARLY RETURN ━━━\n\ndef mutloq(son):\n    if son >= 0:\n        return son      ← ijobiy: darhol qaytadi\n    return -son         ← manfiy: ishorasiz\n\n━━━ RETURN NONE ━━━\n\ndef chiqar(ism):\n    print(f"Salom, {ism}!")\n    # return yo\'q\n\nx = chiqar("Ali")   → Salom, Ali!\nprint(x)            → None',

{id:'args',f:'3.20_args.py',
info:'3.20 — FUNKSIYAGA RO\'YXAT UZATISH\nRo\'yxat ham parametr bo\'la oladi.\n\ndef f(ro\'yxat): ...\n\n*args — istalgancha argument:\ndef f(*args): ...\n\n**kwargs — nom bilan:\ndef f(**kwargs): ...',
detail:'*ARGS VA **KWARGS — BATAFSIL\n\n━━━ ODDIY RO\'YXAT PARAMETR ━━━\n\ndef jami(sonlar):\n    return sum(sonlar)\n\njami([1,2,3,4,5])  → 15\n\n━━━ *ARGS — ISTALGANCHA ━━━\n\ndef ko\'p_jami(*args):\n    return sum(args)\n\nko\'p_jami(1)          → 1\nko\'p_jami(1,2,3)      → 6\nko\'p_jami(10,20,30)   → 60\n\n*args → (1,2,3) tuple sifatida keladi\n\n━━━ **KWARGS — NOM BILAN ━━━\n\ndef shaxs_info(**kwargs):\n    for k,v in kwargs.items():\n        print(f"{k}: {v}")\n\nshaxs_info(ism="Ali", yosh=25)\n→ ism: Ali\n→ yosh: 25\n\n**kwargs → {"ism":"Ali","yosh":25} dict\n\n━━━ ARALASH ━━━\n\ndef f(oddiy, *args, **kwargs):\n    print(oddiy)    ← birinchi\n    print(args)     ← qolganlari tuple\n    print(kwargs)   ← nom bilan dict\n\nf("salom", 1,2,3, til="uz")\n→ salom\n→ (1, 2, 3)\n→ {\'til\': \'uz\'}',
tq:'*args funksiya ichida qanday turda keladi?',
to:['list','dict','tuple','set'],
ta:2,
te:'*args — funksiya ichida tuple sifatida keladi. args = (1,2,3). **kwargs esa dict sifatida: {"ism":"Ali"}.',

{id:'funksiya-end',f:'3.23_funksiya_end.py',
info:'3.23 — FUNKSIYA SO\'NGSOZ\nIlg\'or funksiya tushunchalari:\n\nlambda  → bir qatorli funksiya\nmap()   → ro\'yxatga funksiya\nfilter()→ shartga mos elementlar\nsorted() + key=\n\nDRY tamoyili',
detail:'FUNKSIYA — ILGOR MAVZULAR\n\n━━━ LAMBDA ━━━\n\nLambda — ismsiz, bir qatorli funksiya.\n\ndef ikkilamchi(x):\n    return x * 2\n\n# lambda bilan:\nikkilamchi = lambda x: x * 2\n\n# Farqi yo\'q, lambda qisqaroq\nprint(ikkilamchi(5))  → 10\n\n━━━ MAP() ━━━\n\nsonlar = [1, 2, 3, 4, 5]\nkvadratlar = list(map(lambda x: x**2, sonlar))\n→ [1, 4, 9, 16, 25]\n\n━━━ FILTER() ━━━\n\njuftlar = list(filter(lambda x: x%2==0, sonlar))\n→ [2, 4]\n\n━━━ SORTED + KEY ━━━\n\nso\'zlar = ["banana", "olma", "kivi"]\nsorted(so\'zlar, key=len)\n→ ["kivi", "olma", "banana"]\n\ntalabalar = [{"ism":"Ali","ball":90},{"ism":"Vali","ball":75}]\nsorted(talabalar, key=lambda t: t["ball"], reverse=True)\n→ Ali birinchi (90 > 75)\n\n━━━ FUNKSIYA ICHIDA FUNKSIYA ━━━\n\ndef tashqi(x):\n    def ichki(y):\n        return y * 2\n    return ichki(x) + 1\n\n━━━ DRY TAMOYILI ━━━\n\nDon\'t Repeat Yourself — kodni takrorlamang!\nTakrorlanuvchi kodni funksiyaga chiqaring.',

info:'3.22 — MODULLAR\nKodni faylga ajratish va import.\n\nimport modul_nomi\nimport modul as nom\nfrom modul import f\nfrom modul import *\n\nmath, random — tayyor modullar',
detail:'MODULLAR — BATAFSIL\n\nModul — alohida .py fayl. Funksiyalar va o\'zgaruvchilar.\n\n━━━ IMPORT USULLARI ━━━\n\n1. import math\n   math.sqrt(16)  ← modul nomi bilan\n\n2. import math as m\n   m.sqrt(16)     ← qisqa nom\n\n3. from math import sqrt\n   sqrt(16)       ← to\'g\'ridan-to\'g\'ri\n\n4. from math import sqrt, pi, floor\n   sqrt(16) + pi  ← bir nechtasi\n\n5. from math import *   ← TAVSIYA QILINMAYDI!\n\n━━━ MATH MODULI ━━━\n\nimport math\n\nmath.sqrt(16)      → 4.0  (kvadrat ildiz)\nmath.pi            → 3.14159...\nmath.floor(3.9)    → 3    (pastga yaxlitlash)\nmath.ceil(3.1)     → 4    (tepaga)\nmath.log2(8)       → 3.0\nmath.log10(100)    → 2.0\nmath.pow(2, 10)    → 1024.0\n\n━━━ RANDOM MODULI ━━━\n\nimport random\n\nrandom.randint(1, 100)       → 1-100 orasida butun son\nrandom.random()              → 0.0 va 1.0 orasida\nrandom.choice(["a","b","c"]) → tasodifiy element\nrandom.shuffle(ro\'yxat)      → ro\'yxatni aralashtiradi\n\n━━━ O\'Z MODULINGIZ ━━━\n\n# utils.py faylida:\ndef salomlash(ism):\n    return f"Salom, {ism}!"\n\n# main.py faylida:\nimport utils\nprint(utils.salomlash("Ali"))  → Salom, Ali!',

{id:'klass',f:'3.24_klass.py',
info:'3.24 — KLASS VA OBYEKT\nOOP — Obyektga yo\'naltirilgan.\n\nclass Nom:\n    def __init__(self, p):\n        self.p = p\n\n__init__ — konstruktor\nself      — obyektning o\'zi\natribut   — ma\'lumot\nmetod     — funksiya',
detail:'KLASS VA OBYEKT — BATAFSIL\n\nKlass — shablyon (blueprint).\nObyekt — shablondan yaratilgan narsa.\n\nMisol: "Mashina" — klass.\n       "GM Malibu 2020" — obyekt.\n\n━━━ KLASS YARATISH ━━━\n\nclass Mashina:\n    def __init__(self, marka, model, yil):\n        self.marka = marka    ← atribut\n        self.model = model\n        self.yil = yil\n\n    def info(self):           ← metod\n        print(f"{self.marka} {self.model}, {self.yil}")\n\n━━━ OBYEKT YARATISH ━━━\n\nauto1 = Mashina("GM", "Malibu", 2020)\nauto2 = Mashina("Toyota", "Camry", 2022)\n\nauto1.info()   → GM Malibu, 2020\nauto2.info()   → Toyota Camry, 2022\n\n━━━ __INIT__ ━━━\n\n__init__ — konstruktor. Obyekt yaratilganda\navtomatik chaqiriladi.\nself — yaratilayotgan obyektning o\'zi.\nHar metodning birinchi parametri self!\n\n━━━ ATRIBUT VA METOD ━━━\n\nAtribut — ma\'lumot: self.marka = "GM"\nMetod   — harakat: def info(self):\n\n━━━ TYPE ━━━\n\ntype(auto1)         → <class \'Mashina\'>\ntype(auto1.marka)   → <class \'str\'>\nisinstance(auto1, Mashina)  → True',

{id:'oop',f:'3.30_oop.py',
info:'3.30 — OOP NIMA?\nObyektga yo\'naltirilgan dasturlash.\n\nMeros (Inheritance):\nclass Bola(Ota): ...\nsuper().__init__()\n\nPolimorfizm:\nhar klass o\'z usulida ishleydi',
detail:'OOP — BATAFSIL\n\nOOP — Obyektga Yo\'naltirilgan Dasturlash.\n4 tamoyil: Encapsulation, Inheritance, Polymorphism, Abstraction.\n\n━━━ INHERITANCE (MEROS) ━━━\n\nclass Hayvon:\n    def __init__(self, ism, tur):\n        self.ism = ism\n        self.tur = tur\n\n    def tanistir(self):\n        print(f"Men {self.ism}, {self.tur}")\n\nclass Mushuk(Hayvon):      ← Hayvon dan meros\n    def ovoz(self):\n        print("Meow!")\n\nclass It(Hayvon):          ← Hayvon dan meros\n    def ovoz(self):\n        print("Woof!")\n\nmushuk1 = Mushuk("Mitti","mushuk")\nit1 = It("Rex","it")\nmushuk1.tanistir()   → Men Mitti, mushuk\nmushuk1.ovoz()       → Meow!\nit1.ovoz()           → Woof!\n\n━━━ SUPER() ━━━\n\nclass Elektrik(Mashina):\n    def __init__(self, marka, yil, batareya):\n        super().__init__(marka, yil)   ← ota __init__\n        self.batareya = batareya\n\n━━━ POLYMORPHISM ━━━\n\nHar klass ovoz() metodini o\'zicha bajaradi.\nBu polimorfizm: bir nom, har xil harakat.\n\n━━━ ENCAPSULATION ━━━\n\nMa\'lumot va funksiyalar birgalikda klassdda.\nTashqaridan to\'g\'ridan-to\'g\'ri o\'zgartirib\nbo\'lmaydi (private atributlar: self.__narx).',
tq:'super().__init__() nima qiladi?',
to:['Klass o\'chiriladi','Ota klass konstruktorini chaqiradi','Yangi klass yaratadi','Metodlarni o\'chiradi'],
ta:1,
te:'super() — ota klassga murojaat. super().__init__() — ota klassning konstruktorini chaqiradi, atributlarni meros oladi.',

{id:'github',f:'3.25_github.py',
info:'3.25 — GITHUB PORTFOLIO\nGit — versiyani boshqarish.\n\ngit init        → yangi repo\ngit add .       → fayllarni belgilash\ngit commit -m   → saqlash\ngit push        → GitHub ga yuklash\n\n.gitignore — keraksiz fayllar',
detail:'GIT VA GITHUB — BATAFSIL\n\nGit — kod versiyalarini boshqarish tizimi.\nGitHub — git repolarini onlayn saqlash.\n\n━━━ ASOSIY BUYRUQLAR ━━━\n\ngit init                      → yangi repo yaratish\ngit status                    → holatni ko\'rish\ngit add fayl.py               → faylni tayyorlash\ngit add .                     → barcha fayllarni\ngit commit -m "xabar"         → saqlash (snapshot)\ngit log                       → tarix\n\n━━━ GITHUB BILAN ISHLASH ━━━\n\ngit remote add origin URL     → github bilan bog\'lash\ngit push origin main          → yuklash\ngit pull origin main          → yuklab olish\ngit clone URL                 → nusxa olish\n\n━━━ BRANCH ━━━\n\ngit branch yangi-xususiyat    → yangi branch\ngit checkout yangi-xususiyat  → o\'tish\ngit merge yangi-xususiyat     → birlashtirish\n\n━━━ .GITIGNORE ━━━\n\n# .gitignore fayli:\n__pycache__/\n*.pyc\n.env\nvenv/\n→ Bu fayllar git ga kirmaydi\n\n━━━ PORTFOLIO UCHUN ━━━\n\n1. Har loyiha uchun repo\n2. README.md — tavsif\n3. Har kun commit\n4. Ko\'rsatish: github.com/username',
tq:'git commit -m "..." nima qiladi?',
to:['Fayllarni o\'chiradi','O\'zgarishlarni xabar bilan saqlaydi','GitHub ga yuklaydi','Yangi branch yaratadi'],

{id:'xatolar',f:'3.26_xatolar.py',
info:'3.26 — KO\'P UCHRAYDIGAN XATOLAR\nAsosiy xato turlari:\n\nSyntaxError  → sinteks xato\nNameError    → o\'zgaruvchi yo\'q\nTypeError    → tur xato\nIndexError   → indeks chegaradan\nKeyError     → kalit yo\'q\nZeroDivisionError → 0 ga bo\'lish',
detail:'KO\'P UCHRAYDIGAN XATOLAR — BATAFSIL\n\n━━━ 1. SYNTAXERROR ━━━\n\nprint("Salom"    ← ) yetishmaydi\nif x == 5       ← : yetishmaydi\n\nPython kodni bajarmasdan xato ko\'rsatadi.\n\n━━━ 2. NAMEERROR ━━━\n\nprint(ism)  → NameError: ism aniqlanmagan\n\nSabab: ism = "Ali" deb yozilmagan.\n\n━━━ 3. TYPEERROR ━━━\n\nprint("Yosh: " + 25)  → TypeError\nprint("Yosh: " + str(25))  ← to\'g\'ri\n\n"Ali" + "Vali"  → "AliVali"  (string concat)\n"Ali" + 25      → TypeError  (str + int bo\'lmaydi)\n\n━━━ 4. INDEXERROR ━━━\n\nro\'yxat = ["a","b","c"]\nro\'yxat[5]  → IndexError\nro\'yxat[-1] → "c" (xato emas!)\n\n━━━ 5. KEYERROR ━━━\n\nd = {"ism":"Ali"}\nd["yosh"]       → KeyError\nd.get("yosh")   → None (xato yo\'q!)\n\n━━━ 6. ZERODIVISIONERROR ━━━\n\n5 / 0    → ZeroDivisionError\n5 // 0   → ZeroDivisionError\n\n━━━ XATOLARNI O\'QISH ━━━\n\nTraceback (most recent call last):\n  File "main.py", line 3, in <module>\n    print(ism)\nNameError: name \'ism\' is not defined\n\n→ Fayl nomi + qator raqami + xato nomi!\n   Shu ma\'lumot bilan topsa bo\'ladi.',
tq:'TypeError qachon chiqadi?',
to:['O\'zgaruvchi topilmaganda','Noto\'g\'ri tur ishlatilganda (str+int kabi)','Kalit topilmaganda','Indeks chegaradan chiqsa'],
ta:1,
te:'TypeError — tur mos kelmaganda. "Ali" + 25 → TypeError. Tuzatish: str(25) yoki f"Salom {25}".',
lines:[
{c:'# 3.26 — Ko\'p uchraydigan xatolar',n:''},
{c:'',n:''},
{c:'# TypeError misoli va yechimi',n:''},
{c:'yosh = 25',n:'yosh o\'zgaruvchisiga 25 berdingiz'},
{c:'print("Yosh: " + str(yosh))',n:'str() bilan int ni matnga aylantirib birlashtirgdingiz'},
{c:'',n:''},
{c:'# IndexError dan saqlanish',n:''},
{c:'ro\'yxat = ["a", "b", "c"]',n:'3 elementli ro\'yxat yaratdingiz'},

{c:'else:',n:'aks holda blok boshladingiz'},
{c:'    print("Indeks chegaradan tashqari")',n:'xavfsiz xabar chiqardingiz'},

]},

{id:'tryexcept',f:'3.27_try_except.py',
info:'3.27 — XATOLAR BILAN ISHLASH\ntry-except-finally:\n\ntry:\n    # xavfli kod\nexcept XatoTuri:\n    # xato bo\'lsa\nelse:\n    # xato bo\'lmasa\nfinally:\n    # har doim',
detail:'TRY-EXCEPT — BATAFSIL\n\ntry-except — xatolarni ushlab, dastur crash bo\'lishini oldini oladi.\n\n━━━ ASOSIY SHAKL ━━━\n\ntry:\n    x = int(input("Son: "))  ← xato bo\'lishi mumkin\nexcept ValueError:\n    print("Bu son emas!")    ← ushlandi\n\n━━━ EXCEPT TURLARI ━━━\n\ntry:\n    ...\nexcept ValueError:\n    print("Qiymat xato")\nexcept ZeroDivisionError:\n    print("0 ga bo\'lish")\nexcept (TypeError, KeyError):\n    print("Tur yoki kalit xato")\nexcept Exception as e:\n    print(f"Xato: {e}")     ← har qanday xato\n\n━━━ ELSE ━━━\n\ntry:\n    n = int("25")\nexcept ValueError:\n    print("Xato")\nelse:\n    print(f"Muvaffaqiyat: {n}")  ← xato bo\'lmasa\n\n━━━ FINALLY ━━━\n\ntry:\n    f = open("file.txt")\nexcept FileNotFoundError:\n    print("Fayl yo\'q")\nfinally:\n    print("Har doim bajariladi")  ← xato bo\'lsa ham!\n\n━━━ RAISE — XATO CHIQARISH ━━━\n\ndef yoshni_tekshir(yosh):\n    if yosh < 0:\n        raise ValueError("Yosh manfiy bo\'lmaydi!")\n    return yosh\n\ntry:\n    yoshni_tekshir(-5)\nexcept ValueError as e:\n    print(e)',
tq:'finally bloki qachon bajariladi?',
to:['Faqat xato bo\'lganda','Faqat xato bo\'lmaganda','Har doim, xato bo\'lsa ham bo\'lmasa ham','Faqat return dan keyin'],
ta:2,
te:'finally — har doim bajariladi: xato bo\'lsa ham, bo\'lmasa ham. Faylni yopish, ulanishni uzish kabi tozalash uchun ishlatiladi.',
lines:[
{c:'# 3.27 — try-except-finally',n:''},
{c:'',n:''},
{c:'def bo\'lish(a, b):',n:'bo\'lish funksiyasi yaratdingiz'},
{c:'    try:',n:'xavfli kodni try ga yozdingiz'},
{c:'        natija = a / b',n:'bo\'lishni bajarishga harakat qildingiz'},
{c:'        return natija',n:'muvaffaqiyatli natijani qaytardingiz'},
{c:'    except ZeroDivisionError:',n:'nolga bo\'lish xatosini ushladingiz'},
{c:'        print("Xato: nolga bolish!")',n:'xato xabarini chiqardingiz'},
{c:'        return None',n:'None qaytardingiz'},
{c:'    finally:',n:'finally bloki har doim ishlaydi deb yozdingiz'},
{c:'        print("bo\'lish funksiyasi tugadi")',n:'finally da xabar chiqardingiz'},
{c:'',n:''},
{c:'print(bo\'lish(10, 2))',n:'to\'g\'ri bo\'linma chiqardingiz'},
{c:'print(bo\'lish(5, 0))',n:'nolga bo\'linma — xato ushlandi'},
{c:'',n:''},
{c:'# ValueError ushlash',n:''},
{c:'try:',n:''},
{c:'    son = int("abc")',n:'matni int ga aylantirishga urinib xato chiqardingiz'},
{c:'except ValueError as e:',n:'ValueError ni e nomi bilan ushladingiz'},
{c:'    print(f"ValueError: {e}")',n:'xato xabarini f-string bilan chiqardingiz'}
]},

{id:'stdlib',f:'3.28_stdlib.py',
info:'3.28 — PYTHON STANDART KUTUBXONASI\nO\'rnatishsiz ishlatiladigan modullar:\n\nmath     → matematika\nrandom   → tasodifiylik\ndatetime → sana va vaqt\nos       → fayl tizimi\nsys      → tizim ma\'lumotlari\njson     → JSON bilan ishlash',
detail:'STANDART KUTUBXONA — BATAFSIL\n\nPython bilan birga keladigan modullar — bepul va tayyorB\n\n━━━ MATH ━━━\n\nimport math\nmath.sqrt(16)    → 4.0\nmath.pi          → 3.14159...\nmath.factorial(5)→ 120\nmath.gcd(12, 8)  → 4\n\n━━━ RANDOM ━━━\n\nimport random\nrandom.randint(1,100)       → butun son\nrandom.random()             → 0.0-1.0\nrandom.choice([1,2,3])      → element\nrandom.sample([1,2,3,4],2)  → 2 ta tanlov\n\n━━━ DATETIME ━━━\n\nfrom datetime import datetime\nnow = datetime.now()\nprint(now.year)    → 2025\nprint(now.month)   → 4\nprint(now.day)     → 16\nprint(now.strftime("%Y-%m-%d"))  → 2025-04-16\n\n━━━ OS ━━━\n\nimport os\nos.getcwd()         → joriy papka\nos.listdir(".")     → fayllar\nos.path.exists(p)   → mavjudmi?\nos.mkdir("papka")   → papka yaratish\n\n━━━ JSON ━━━\n\nimport json\n\nd = {"ism": "Ali", "yosh": 25}\nmatn = json.dumps(d)         → matn (JSON string)\nqayta = json.loads(matn)     → dict ga qaytarish',

to:['Unix vaqt (soniyalar)','Hozirgi sana va vaqt obyekti','Faqat sana (kun/oy/yil)','Faqat vaqt (soat:daqiqa)'],

detail:'TASHQI KUTUBXONALAR — BATAFSIL\n\nPyPI — Python Package Index.\n400,000+ kutubxona bepul.\n\n━━━ O\'RNATISH ━━━\n\npip install pandas\npip install numpy matplotlib seaborn\npip install requests\n\npip list                    → o\'rnatilganlar\npip show pandas             → info\npip uninstall pandas        → o\'chirish\npip install pandas==1.5.3   → versiya ko\'rsatish\n\n━━━ REQUIREMENTS.TXT ━━━\n\npip freeze > requirements.txt\n→ barcha kutubxonalar yoziladi\n\npip install -r requirements.txt\n→ barchasini o\'rnatish\n\n━━━ MASHHUR KUTUBXONALAR ━━━\n\npandas      → DataFrame, CSV, Excel\nnumpy       → massivlar, matematik\nmatplotlib  → grafiklar, vizualizatsiya\nseaborn     → statistik grafiklar\nrequests    → HTTP so\'rovlar, API\nflask       → web ilovalar\nscikit-learn→ Machine Learning\ntensorflow  → Deep Learning\nopencv      → tasvir qayta ishlash\n\n━━━ IMPORT USLUBI ━━━\n\nimport pandas as pd           ← standart alias\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport seaborn as sns\n\nBu aliaslar butun data science jamoasida qabul qilingan!',

{id:'oop2',f:'3.30_oop2.py',
info:'3.30 — OOP TAMOYILLARI\n4 asosiy tamoyil:\n\nEncapsulation  → berkitish\nInheritance    → meros\nPolymorphism   → ko\'p shakllilik\nAbstraction    → abstraksiya\n\nPython OOP ni to\'liq qo\'llaydi',
detail:'OOP TAMOYILLARI — BATAFSIL\n\n━━━ 1. ENCAPSULATION (BERKITISH) ━━━\n\nMa\'lumot va funksiyalarni birgalikda saqlash.\nPrivate atributlar: __ (ikki pastki chiziq)\n\nclass BankHisobi:\n    def __init__(self):\n        self.__balans = 0    ← private\n\n    def kirim(self, summa):\n        self.__balans += summa\n\n    def balans(self):\n        return self.__balans\n\n━━━ 2. INHERITANCE (MEROS) ━━━\n\nclass Hayvon:\n    def nafas_ol(self):\n        print("nafas olmoqda")\n\nclass Mushuk(Hayvon):    ← meros\n    def meow(self):\n        print("Meow!")\n\nmushuk = Mushuk()\nmushuk.nafas_ol()  ← meros olingan metod!\nmushuk.meow()\n\n━━━ 3. POLYMORPHISM ━━━\n\nclass Shakl:\n    def maydon(self):\n        return 0\n\nclass Doira(Shakl):\n    def maydon(self):\n        return 3.14 * self.r ** 2\n\nclass Kvadrat(Shakl):\n    def maydon(self):\n        return self.a ** 2\n\n# Bir xil nom, har xil ishlash!\n\n━━━ 4. ABSTRACTION ━━━\n\nMurakkablikni berkitish.\nFoydalanuvchi faqat interfeys bilan ishlaydi,\nichki ishlash muhim emas.',
tq:'Encapsulation nima maqsadda ishlatiladi?',
to:['Kodni tezlashtirish uchun','Ma\'lumot va funksiyalarni birgalikda himoyalash','Meros olish uchun','Interfeys yaratish uchun'],
ta:1,
te:'Encapsulation — ma\'lumot va funksiyalarni birgalikda klassda saqlash va tashqaridan bevosita o\'zgartirishdan himoyalash.',
lines:[
{c:'# 3.30 — OOP tamoyillari amalda',n:''},
{c:'',n:''},
{c:'class Shakl:',n:'asosiy Shakl klassini yaratdingiz'},
{c:'    def tur(self):',n:'tur metodini yozdingiz'},
{c:'        return "Nomalum shakl"',n:'standart tur nomini qaytardingiz'},
{c:'',n:''},
{c:'    def maydon(self):',n:'maydon metodini yozdingiz'},
{c:'        return 0',n:'standart 0 qaytardingiz'},
{c:'',n:''},
{c:'class Toʻrtburchak(Shakl):',n:'Shakldan meros olgan To\'rtburchak yaratdingiz'},
{c:'    def __init__(self, a, b):',n:'konstruktor yozdingiz'},
{c:'        self.a = a',n:'a tomonini saqladdingiz'},
{c:'        self.b = b',n:'b tomonini saqladdingiz'},
{c:'',n:''},
{c:'    def tur(self):',n:'tur metodini qayta yozdingiz (override)'},
{c:'        return "Toʻrtburchak"',n:'To\'rtburchak nomini qaytardingiz'},
{c:'',n:''},
{c:'    def maydon(self):',n:'maydon metodini qayta yozdingiz'},
{c:'        return self.a * self.b',n:'to\'rtburchak maydonini qaytardingiz'},
{c:'',n:''},
{c:'t = Toʻrtburchak(4, 5)',n:'4x5 li to\'rtburchak yaratdingiz'},
{c:'print(t.tur())',n:'shakl turini chiqardingiz'},
{c:'print(t.maydon())',n:'maydonni chiqardingiz'}
]},

/* ═══════════════ ENGINE (Part 1 bilan bir xil) ═══════════════ */
var cur=0,skipOn=false,brightLevel=3,ghostVisible=true,resultVisible=false,testVisible=false;
var lineData=[],testAnswered=false,modProgress={};
var BRIGHT_OPACITY=[0,0.05,0.1,0.2,0.3,0.42,0.55,0.65,0.75,0.85,0.95];

window.onload=function(){buildTabs();loadMod(0);setupKeyboardScroll();};

function setupKeyboardScroll(){
  if(!window.visualViewport) return;
  var lastH=window.visualViewport.height;
  window.visualViewport.addEventListener('resize',function(){
    var newH=window.visualViewport.height;
    if(newH<lastH-50){
      setTimeout(function(){
        var el=document.activeElement;
        if(!el||!el.classList.contains('line-input')) return;
        var rect=el.getBoundingClientRect();
        var vpTop=window.visualViewport.offsetTop;
        var vpH=window.visualViewport.height;
        var elCenter=window.scrollY+rect.top+rect.height/2;
        var target=elCenter-(vpTop+vpH*0.35);
        window.scrollTo({top:Math.max(0,target),behavior:'smooth'});
      },200);
    }
    lastH=newH;
  });
  document.addEventListener('focus',function(e){
    if(!e.target.classList.contains('line-input')) return;
    if(!window.visualViewport) return;
    setTimeout(function(){
      var rect=e.target.getBoundingClientRect();
      var vpTop=window.visualViewport.offsetTop;
      var vpH=window.visualViewport.height;
      if(rect.top>vpTop+50&&rect.bottom<vpTop+vpH-80) return;
      var elCenter=window.scrollY+rect.top+rect.height/2;
      var target=elCenter-(vpTop+vpH*0.35);
      window.scrollTo({top:Math.max(0,target),behavior:'smooth'});
    },300);
  },true);
}

function setBright(v){brightLevel=parseInt(v);document.getElementById('brightVal').textContent=v;applyBright();}
function applyBright(){
  var op=BRIGHT_OPACITY[brightLevel];
  document.querySelectorAll('.line-ghost').forEach(function(g){
    if(!g.classList.contains('skip-c')&&ghostVisible)g.style.color='rgba(74,96,128,'+op+')';
  });
}
function buildTabs(){
  var c=document.getElementById('tabs');c.innerHTML='';
  M.forEach(function(m,i){
    var d=document.createElement('div');
    d.className='tab'+(i===cur?' on':'')+(modProgress[i]?' done':'');
    d.id='tab'+i;d.textContent=(i+1)+'. '+m.id;
    d.onclick=(function(n){return function(){loadMod(n);};})(i);
    c.appendChild(d);
  });
}
function loadMod(i){
  cur=i;resultVisible=false;testVisible=false;testAnswered=false;
  document.getElementById('resultPanel').className='result-panel';
  document.getElementById('testPanel').className='test-panel';
  document.getElementById('detailPanel').className='detail-panel';
  document.getElementById('badge').className='badge';
  var m=M[i];
  document.getElementById('fname').textContent=m.f;
  document.getElementById('topSub').textContent=m.f;
  document.querySelectorAll('.tab').forEach(function(t,j){t.classList.toggle('on',j===i);});
  document.getElementById('infoBox').textContent=m.info;
  buildLines(m);updateStats();updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}
function getIndent(s){var r=s.match(/^(\s+)/);return r?r[1]:'';}
function buildLines(m){
  var wrap=document.getElementById('linesWrap');wrap.innerHTML='';lineData=[];
  var op=BRIGHT_OPACITY[brightLevel];
  m.lines.forEach(function(ln,i){
    var isCom=ln.c.trimStart().charAt(0)==='#';
    var isEmpty=ln.c==='';
    var indent=getIndent(ln.c);
    var cp=isEmpty?'':ln.c.slice(indent.length);
    var block=document.createElement('div');block.className='line-block';block.id='block'+i;
    var row=document.createElement('div');row.className='line-row';
    var num=document.createElement('div');num.className='line-num';num.id='num'+i;
    num.textContent=isEmpty?'':i+1;
    if(indent.length>0&&!isEmpty){
      var pre=document.createElement('div');pre.className='line-indent-pre';
      pre.textContent=indent.replace(/ /g,'\u00a0');
      row.appendChild(num);row.appendChild(pre);
    } else {row.appendChild(num);}
    var content=document.createElement('div');content.className='line-content';
    var ghost=document.createElement('div');
    ghost.className='line-ghost'+((isCom&&skipOn)?' skip-c':'');
    ghost.id='ghost'+i;ghost.style.color=ghostVisible?'rgba(74,96,128,'+op+')':'transparent';
    ghost.textContent=cp||' ';
    var colors=document.createElement('div');colors.className='line-colors';colors.id='clr'+i;
    var inp=document.createElement('input');inp.type='text';inp.className='line-input';inp.id='inp'+i;
    inp.setAttribute('spellcheck','false');inp.setAttribute('autocorrect','off');
    inp.setAttribute('autocapitalize','off');inp.setAttribute('autocomplete','off');
    if(isEmpty||(isCom&&skipOn)) inp.disabled=true;
    (function(idx,ct,isC,empty,note){
      inp.addEventListener('input',function(){
        if(empty) return;
        updateClr(idx,ct,isC);
        if(inp.value===ct&&ct!==''&&note!=='')showNote(idx);else hideNote(idx);
        updateStats();
      });
    })(i,cp,isCom,isEmpty,ln.n);
    content.appendChild(ghost);content.appendChild(colors);content.appendChild(inp);
    row.appendChild(content);
    var note=document.createElement('div');note.className='line-done-note';note.id='note'+i;
    note.textContent='✅ Siz '+ln.n+'!';
    block.appendChild(row);if(ln.n)block.appendChild(note);
    wrap.appendChild(block);
    lineData.push({inp:inp,target:cp,isCom:isCom,isEmpty:isEmpty});
  });
}
function showNote(i){document.getElementById('note'+i).classList.add('show');}
function hideNote(i){var n=document.getElementById('note'+i);if(n)n.classList.remove('show');}
function updateClr(idx,target,isCom){
  if(isCom&&skipOn) return;
  var inp=document.getElementById('inp'+idx),clr=document.getElementById('clr'+idx);
  var typed=inp.value,html='';
  for(var ci=0;ci<target.length;ci++){
    var ch=target[ci];
    if(ci<typed.length)html+=typed[ci]===ch?'<span style="color:#22c55e">'+esc(ch)+'</span>':'<span style="color:#f43f5e;text-decoration:underline">'+esc(ch)+'</span>';
    else html+='<span style="color:transparent">'+esc(ch)+'</span>';
  }
  clr.innerHTML=html;
  document.getElementById('num'+idx).style.color=(typed===target&&target!=='')?'#22c55e':'';
}
function updateStats(){
  var done=0,total=0;
  lineData.forEach(function(l){if(l.isEmpty||(l.isCom&&skipOn))return;total++;if(l.inp.value===l.target)done++;});
  var pct=total>0?Math.round(done/total*100):0;
  document.getElementById('svPct').textContent=done>0?pct+'%':'—';
  document.getElementById('svDone').textContent=done+'/'+total;
  document.getElementById('svTotal').textContent=total+' ta';
}
function updateProgress(){
  var done=Object.keys(modProgress).length,total=M.length;
  document.getElementById('progressFill').style.width=Math.round(done/total*100)+'%';
  document.getElementById('progressLbl').textContent=done+' / '+total+' mavzu bajarildi';
}
function doCheck(){
  var done=0,total=0,errors=[];
  lineData.forEach(function(l,i){
    if(l.isEmpty||(l.isCom&&skipOn))return;total++;
    if(l.inp.value===l.target){done++;document.getElementById('num'+i).style.color='#22c55e';}
    else{errors.push(i+1);document.getElementById('num'+i).style.color='#f43f5e';}
  });
  var pct=Math.round(done/total*100),b=document.getElementById('badge');
  b.className='badge show';
  if(pct>=85){b.className+=' g';b.textContent='🎉 Zor! '+pct+'% ('+done+'/'+total+')';modProgress[cur]=true;document.getElementById('tab'+cur).classList.add('done');updateProgress();}
  else if(pct>=55){b.className+=' o';b.textContent='👍 '+pct+'% — xato: '+errors.join(', ')+'-qatorlar';}
  else{b.className+=' r';b.textContent='❌ '+pct+'% — xato: '+errors.join(', ')+'-qatorlar';}
}
function doClear(){
  lineData.forEach(function(l,i){
    l.inp.value='';var c=document.getElementById('clr'+i);if(c)c.innerHTML='';
    var n=document.getElementById('num'+i);if(n)n.style.color='';hideNote(i);
  });
  document.getElementById('badge').className='badge';updateStats();
}
function toggleGhost(){
  ghostVisible=!ghostVisible;
  document.querySelectorAll('.line-ghost').forEach(function(g){g.style.visibility=ghostVisible?'visible':'hidden';});
  document.getElementById('ghostBtn').textContent=ghostVisible?'👁️ Yashir':'👁️ Ko\'rsat';
}
function toggleSkip(){
  skipOn=!skipOn;
  document.getElementById('sw').classList.toggle('on',skipOn);
  document.getElementById('skipLbl').textContent=skipOn?'Kommentlar o\'tkazilmoqda':'# Kommentlarni o\'tkazib yuboring';
  buildLines(M[cur]);applyBright();updateStats();
}
function toggleDetail(){
  var p=document.getElementById('detailPanel');
  if(p.classList.contains('show'))p.classList.remove('show');
  else{document.getElementById('detailContent').textContent=M[cur].detail;p.classList.add('show');}
}
function toggleTest(){
  testVisible=!testVisible;var p=document.getElementById('testPanel');
  if(testVisible){p.className='test-panel show';buildTest();}else p.className='test-panel';
}
function buildTest(){
  var m=M[cur];
  document.getElementById('testQ').textContent=m.tq;
  document.getElementById('testExp').className='test-exp';
  testAnswered=false;var opts=document.getElementById('testOpts');opts.innerHTML='';
  m.to.forEach(function(opt,i){
    var btn=document.createElement('button');btn.className='test-opt';
    btn.textContent=(i+1)+'. '+opt;
    btn.onclick=(function(idx){return function(){
      if(testAnswered)return;testAnswered=true;var ok=(idx===m.ta);
      document.querySelectorAll('.test-opt').forEach(function(b,j){
        if(j===m.ta)b.classList.add('correct');else if(j===idx&&!ok)b.classList.add('wrong');
      });
      var exp=document.getElementById('testExp');
      exp.textContent=(ok?'✅ To\'g\'ri! ':'❌ Xato. ')+m.te;exp.className='test-exp show';
    };})(i);opts.appendChild(btn);
  });
}
function toggleResult(){
  resultVisible=!resultVisible;var p=document.getElementById('resultPanel');
  if(resultVisible){
    p.className='result-panel show';
    document.getElementById('simWrap').innerHTML=SIMS[M[cur].id]||'<div style="padding:12px;color:#4a6080;font-size:.7rem;">Simulatsiya yo\'q</div>';
  }else p.className='result-panel';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
